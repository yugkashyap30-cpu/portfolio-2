<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    
    <!-- 📱 Mobile Responsive Fix (IMPORTANT) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Meri Website</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        header {
            background: #4CAF50;
            color: white;
            text-align: center;
            padding: 15px;
        }

        .container {
            padding: 15px;
        }

        .box {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        /* 📱 Mobile friendly images */
        img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
        }

        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>

<body>

<header>
    <h1>Welcome to My Website</h1>
</header>

<div class="container">

    <div class="box">
        <h2>About</h2>
        <p>Ye meri simple website hai jo mobile friendly hai 👍</p>
    </div>

    <div class="box">
        <h2>Image</h2>
        <img src="https://via.placeholder.com/600x300" alt="sample image">
    </div>

    <div class="box">
        <h2>Click Button</h2>
        <button onclick="alert('Hello Bhai 👋')">Click Me</button>
    </div>

</div>

</body>
</html>
